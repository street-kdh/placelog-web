function extractPlaceName(t){let c=t.trim();if(c.includes("] "))c=c.split("] ").slice(1).join("] ");if(c.includes(" : "))c=c.split(" : ").slice(0,-1).join(" : ");return c.trim()||t.trim();}
async function notionFetch(path,method="GET",body=null){const opts={method,headers:{"Authorization":`Bearer ${NOTION_TOKEN}`,"Notion-Version":NOTION_VER,"Content-Type":"application/json"}};if(body)opts.body=JSON.stringify(body);const r=await fetch(`${PROXY}https://api.notion.com/${path}`,opts);if(!r.ok)throw new Error(`Notion ${r.status}`);return r.json();}

// ===== 개선 2: 페이지네이션 적용 =====
async function loadRecords(){
  showLoading(true);
  try{
    const allPages=[];
    let cursor=null;
    do {
      const body={sorts:[{timestamp:"created_time",direction:"descending"}]};
      if(cursor) body.start_cursor=cursor;
      const data=await notionFetch(`v1/databases/${NOTION_DB_ID}/query`,"POST",body);
      allPages.push(...data.results);
      cursor=data.has_more?data.next_cursor:null;
    } while(cursor);

    records=allPages.map(page=>{
      const p=page.properties;
      const rawTitle=p["이름"]?.title?.[0]?.plain_text||"";
      const imgText=p["이미지URL"]?.rich_text?.[0]?.plain_text||"";
      const imageUrls=imgText?imgText.split(",").filter(u=>u.length>0):[];
      return{id:page.id,nickname:p["작성자"]?.rich_text?.[0]?.plain_text||"",pin:p["PIN"]?.rich_text?.[0]?.plain_text||"",createdAt:page.created_time||"",placeType:p["장소유형"]?.rich_text?.[0]?.plain_text||"기타",placeName:extractPlaceName(rawTitle),satisfaction:p["만족도"]?.number||0,address:p["주소"]?.rich_text?.[0]?.plain_text||"",content:p["본문"]?.rich_text?.[0]?.plain_text||"",latitude:p["위도"]?.number||0,longitude:p["경도"]?.number||0,profileImageUrl:p["프로필사진"]?.rich_text?.[0]?.plain_text||"",imageUrls};
    });
    updateMapMarkers();
  }catch(e){console.error("Load failed:",e);}
  showLoading(false);
}

function buildNotionProps(rec){const imgText=(rec.imageUrls||[]).join(",");return{"이름":{title:[{text:{content:`[${rec.placeType}] ${rec.placeName} : ${"★".repeat(rec.satisfaction)}`}}]},"작성자":{rich_text:[{text:{content:rec.nickname}}]},"PIN":{rich_text:[{text:{content:rec.pin}}]},"주소":{rich_text:[{text:{content:rec.address}}]},"장소유형":{rich_text:[{text:{content:rec.placeType}}]},"만족도":{number:rec.satisfaction},"위도":{number:rec.latitude},"경도":{number:rec.longitude},"본문":{rich_text:[{text:{content:rec.content||""}}]},"프로필사진":{rich_text:[{text:{content:rec.profileImageUrl||""}}]},"이미지URL":{rich_text:[{text:{content:imgText}}]}};}
async function createNotionRecord(rec){const props=buildNotionProps(rec);const children=[];children.push({object:"block",type:"paragraph",paragraph:{rich_text:[{type:"text",text:{content:`[${rec.nickname} - ${rec.createdAt}]`},annotations:{bold:true,color:"gray"}}]}});if(rec.content)children.push({object:"block",type:"paragraph",paragraph:{rich_text:[{type:"text",text:{content:rec.content}}]}});(rec.imageUrls||[]).forEach(url=>{children.push({object:"block",type:"image",image:{type:"external",external:{url}}});});return notionFetch("v1/pages","POST",{parent:{database_id:NOTION_DB_ID},properties:props,children});}
async function updateNotionRecord(rec){return notionFetch(`v1/pages/${rec.id}`,"PATCH",{properties:buildNotionProps(rec)});}
async function archiveRecord(id){return notionFetch(`v1/pages/${id}`,"PATCH",{archived:true});}
async function uploadImgur(file){const fd=new FormData();fd.append("image",file);const r=await fetch("https://api.imgur.com/3/image",{method:"POST",headers:{Authorization:`Client-ID ${IMGUR_CID}`},body:fd});const d=await r.json();if(d.success)return d.data.link;throw new Error("Upload failed");}
function getRanking(recs,days=null){let filtered=recs;if(days){const c=Date.now()-days*86400000;filtered=recs.filter(r=>new Date(r.createdAt).getTime()>c);}const m={};filtered.forEach(r=>{if(!m[r.nickname])m[r.nickname]={nickname:r.nickname,count:0,profileImageUrl:""};m[r.nickname].count++;if(r.profileImageUrl)m[r.nickname].profileImageUrl=r.profileImageUrl;});return Object.values(m).sort((a,b)=>b.count-a.count).map((e,i)=>({...e,rank:i+1}));}
function getBadge(rank){return rank===1?"👑":rank===2?"🥈":rank===3?"🥉":"";}
function getUserRank(nickname){const r=getRanking(records);const e=r.find(x=>x.nickname===nickname);return e?e.rank:0;}
function runSplash(){const full="Place Log";let i=0;const el=document.getElementById("splashText");const iv=setInterval(()=>{i++;el.textContent=full.substring(0,i)+(i<full.length?"|":"");if(i>=full.length){clearInterval(iv);setTimeout(()=>document.getElementById("splashSub").classList.add("show"),200);}},120);setTimeout(()=>{if(!get("nickname")||!get("pin"))showScreen("settings",true);else showScreen("main");},2800);}
function showScreen(name,isFirstSetup=false){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(name+"Screen").classList.add("active");if(name==="main"){if(!mainMap)initMainMap();else mainMap.invalidateSize();loadRecords();}if(name==="settings"){document.getElementById("settingsBack").style.display=isFirstSetup?"none":"flex";document.getElementById("settingsTitle").textContent=isFirstSetup?"초기 설정":"설정";document.getElementById("nickInput").value=get("nickname");document.getElementById("pinInput").value=get("pin");updateSettingsProfile();const q=parseInt(get("imageQuality","1"));selectQuality(q);}if(name==="record")initRecordScreen();if(name==="pickLocation")initPickLocation();if(name==="view"){webSearchQuery="";const si=document.getElementById("webSearchInput");if(si)si.value="";renderFilterBar();renderViewList();}if(name==="ranking"){rankTab="total";renderRanking();}}
function showLoading(show){const el=document.getElementById("mapLoading");if(el)el.classList.toggle("show",show);}
function initMainMap(){mainMap=L.map("mainMap").setView(userPos,17);L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:'© OpenStreetMap'}).addTo(mainMap);L.circleMarker(userPos,{radius:8,fillColor:"#5C6BC0",fillOpacity:0.8,color:"white",weight:3}).addTo(mainMap);}
let pickMoveTimer=null;function initPickLocation(){const startPos=mainMap?[mainMap.getCenter().lat,mainMap.getCenter().lng]:userPos;if(pickMap){pickMap.remove();pickMap=null;}setTimeout(()=>{pickMap=L.map("pickMap").setView(startPos,17);L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:'© OpenStreetMap'}).addTo(pickMap);document.getElementById("pickAddress").textContent="지도를 움직여 위치를 선택하세요";pickMap.on("moveend",()=>{const c=pickMap.getCenter();document.getElementById("pickAddress").textContent=`${c.lat.toFixed(5)}, ${c.lng.toFixed(5)}`;if(pickMoveTimer)clearTimeout(pickMoveTimer);pickMoveTimer=setTimeout(()=>{fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${c.lat}&lon=${c.lng}&accept-language=ko`).then(r=>r.json()).then(d=>{if(d.display_name)document.getElementById("pickAddress").textContent=d.display_name;}).catch(()=>{});},600);});},100);}
function confirmPickLocation(){if(!pickMap)return;const c=pickMap.getCenter();recordPos=[c.lat,c.lng];showScreen("record");}
function updateMapMarkers(){if(!mainMap)return;markers.forEach(m=>m.remove());markers=[];const ranking=getRanking(records);records.forEach(r=>{if(!r.latitude||!r.longitude)return;const meta=TYPE_META[r.placeType]||TYPE_META["기타"];const rank=ranking.find(x=>x.nickname===r.nickname)?.rank||0;const badge=getBadge(rank);let markerHtml;if(r.profileImageUrl){markerHtml=`<div style="width:34px;height:34px;border-radius:50%;border:3px solid ${meta.tag};box-shadow:0 2px 6px rgba(0,0,0,0.3);overflow:hidden;background:#E8EAED;"><img src="${r.profileImageUrl}" style="width:100%;height:100%;object-fit:cover;"></div>`;}else{markerHtml=`<div style="background:${meta.tag};width:30px;height:30px;border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:14px;">${meta.icon}</div>`;}const icon=L.divIcon({className:"",html:markerHtml,iconSize:[34,34],iconAnchor:[17,17]});const m=L.marker([r.latitude,r.longitude],{icon}).addTo(mainMap);m.bindPopup(`<div style="min-width:180px;cursor:pointer" onclick="showDetail('${r.id}')"><strong>${badge} ${r.placeName}</strong><br><span style="background:${meta.tag};color:white;padding:1px 6px;border-radius:8px;font-size:11px;">${r.placeType}</span> <span style="color:#FFD54F">${"★".repeat(r.satisfaction)}</span><br><small style="color:#636E72">${r.address}</small><br><small style="color:#999">by ${r.nickname}</small><br><small style="color:#7986CB;font-weight:600">터치하여 상세보기 →</small></div>`);markers.push(m);});}
function updateSettingsProfile(){const url=get("profileUrl");const el=document.getElementById("settingsProfile");if(url)el.innerHTML=`<img src="${url}">`;else el.innerHTML=`<span class="profile-placeholder" style="font-size:28px">👤</span>`;}
async function handleProfilePhoto(input){const file=input.files?.[0];if(!file)return;document.getElementById("photoLabel").textContent="업로드 중...";try{const url=await uploadImgur(file);set("profileUrl",url);updateSettingsProfile();}catch{alert("사진 업로드 실패");}document.getElementById("photoLabel").textContent="사진 변경";}
function saveSettings(){const nick=document.getElementById("nickInput").value.trim();const pin=document.getElementById("pinInput").value.trim();if(!nick)return alert("닉네임을 입력해주세요");if(pin.length!==6||!/^\d+$/.test(pin))return alert("PIN은 숫자 6자리로 입력해주세요");set("nickname",nick);set("pin",pin);const qr=document.querySelector("input[name=webQuality]:checked");set("imageQuality",qr?qr.value:"1");alert("저장되었습니다");showScreen("main");}
function initRecordScreen(){selectedType="";satisfaction=0;recordPhotos=[];document.getElementById("placeNameInput").value="";document.getElementById("contentInput").value="";document.getElementById("photoGrid").innerHTML="";document.getElementById("recordAddress").textContent=`${recordPos[0].toFixed(4)}, ${recordPos[1].toFixed(4)}`;renderTypeChips();renderStars();document.getElementById("satSlider").value=0;document.getElementById("satValue").textContent="0 / 10";fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${recordPos[0]}&lon=${recordPos[1]}&accept-language=ko`).then(r=>r.json()).then(d=>{if(d.display_name)document.getElementById("recordAddress").textContent=d.display_name;}).catch(()=>{});}
function renderTypeChips(){const el=document.getElementById("typeChips");el.innerHTML="";TYPES.forEach(t=>{const meta=TYPE_META[t];const btn=document.createElement("button");btn.className=`chip ${meta.cls}${selectedType===t?" selected":""}`;btn.textContent=(selectedType===t?"✓ ":"")+t;btn.onclick=()=>{selectedType=selectedType===t?"":t;renderTypeChips();};el.appendChild(btn);});}
function setSatisfaction(v){satisfaction=v;document.getElementById("satValue").textContent=`${v} / 10`;document.getElementById("satSlider").value=v;renderStars();}
function renderStars(){const el=document.getElementById("starsContainer");el.innerHTML="";for(let i=1;i<=10;i++){const s=document.createElement("span");s.className=`star ${i<=satisfaction?"filled":"empty"}`;s.textContent="★";s.onclick=()=>setSatisfaction(i);el.appendChild(s);}}
function handleRecordPhotos(input){recordPhotos.push(...Array.from(input.files||[]));renderPhotoGrid();}
function renderPhotoGrid(){const el=document.getElementById("photoGrid");el.innerHTML="";recordPhotos.forEach((f,i)=>{const div=document.createElement("div");div.className="photo-thumb";const img=document.createElement("img");img.src=URL.createObjectURL(f);const btn=document.createElement("button");btn.className="photo-remove";btn.textContent="✕";btn.onclick=()=>{recordPhotos.splice(i,1);renderPhotoGrid();};div.appendChild(img);div.appendChild(btn);el.appendChild(div);});}
let webSaveCancelled=false,webSaveCancelTimer=null;
function showSavingOverlay(){document.getElementById("savingOverlay").style.display="flex";document.getElementById("btnWebCancelSave").style.display="none";webSaveCancelled=false;webSaveCancelTimer=setTimeout(()=>{document.getElementById("btnWebCancelSave").style.display="block";},60000);}
function hideSavingOverlay(){document.getElementById("savingOverlay").style.display="none";if(webSaveCancelTimer){clearTimeout(webSaveCancelTimer);webSaveCancelTimer=null;}}
function cancelWebSave(){webSaveCancelled=true;hideSavingOverlay();alert("기록이 취소되었습니다");showScreen("main");}

function goToMyLocation(){if(!mainMap)return;if(navigator.geolocation){navigator.geolocation.getCurrentPosition(pos=>{const ll=[pos.coords.latitude,pos.coords.longitude];userPos=ll;mainMap.setView(ll,17);},()=>{alert("현재 위치를 가져올 수 없습니다");},{enableHighAccuracy:true,timeout:5000});}else{alert("위치 서비스를 지원하지 않는 브라우저입니다");}}
async function saveRecord(){const placeName=document.getElementById("placeNameInput").value.trim();if(!placeName)return alert("장소 이름을 입력해주세요");const fab=document.getElementById("saveFab");fab.disabled=true;fab.textContent="⏳";showSavingOverlay();try{const imageUrls=[];for(const f of recordPhotos){if(webSaveCancelled)return;imageUrls.push(await uploadImgur(f));}if(webSaveCancelled)return;const now=new Date();const pad=n=>String(n).padStart(2,"0");const createdAt=`${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;await createNotionRecord({nickname:get("nickname"),pin:get("pin"),createdAt,placeType:selectedType||"기타",placeName,satisfaction,address:document.getElementById("recordAddress").textContent,content:document.getElementById("contentInput").value,latitude:recordPos[0],longitude:recordPos[1],imageUrls,profileImageUrl:get("profileUrl")});hideSavingOverlay();alert("저장되었습니다!");showScreen("main");}catch(e){hideSavingOverlay();alert("저장 실패: "+e.message);}fab.disabled=false;fab.textContent="💾";}
function renderFilterBar(){const el=document.getElementById("filterBar");el.innerHTML="";["전체",...TYPES].forEach(t=>{const btn=document.createElement("button");const isAll=t==="전체";const active=currentFilter===t;btn.className=`filter-chip${active?" active":""}`;const meta=TYPE_META[t];btn.style.background=active?(isAll?"#7986CB":(meta?.bg||"#F5F5F5")):"#F5F5F5";btn.style.color=active?(isAll?"white":(meta?.text||"#636E72")):"#636E72";btn.textContent=t;btn.onclick=()=>{currentFilter=t;renderFilterBar();renderViewList();};el.appendChild(btn);});}
function renderViewList(){const sort=document.getElementById("sortSelect").value;webSearchQuery=(document.getElementById("webSearchInput")?.value||"").trim().toLowerCase();let list=currentFilter==="전체"?[...records]:records.filter(r=>r.placeType===currentFilter);if(webSearchQuery){list=list.filter(r=>r.placeName.toLowerCase().includes(webSearchQuery)||r.address.toLowerCase().includes(webSearchQuery)||r.content.toLowerCase().includes(webSearchQuery)||r.nickname.toLowerCase().includes(webSearchQuery));}if(webUserFilter){list=list.filter(r=>r.nickname===webUserFilter);}if(sort==="latest")list.sort((a,b)=>b.createdAt.localeCompare(a.createdAt));else if(sort==="oldest")list.sort((a,b)=>a.createdAt.localeCompare(b.createdAt));else if(sort==="satisfaction")list.sort((a,b)=>b.satisfaction-a.satisfaction);const el=document.getElementById("viewList");if(!list.length){el.innerHTML=`<div style="text-align:center;margin-top:60px;color:#B2BEC3"><div style="font-size:18px">아직 기록이 없어요</div><div style="font-size:13px;margin-top:8px">${webSearchQuery?"검색 결과가 없습니다":"기록 버튼을 눌러 첫 기록을 남겨보세요!"}</div></div>`;return;}const ranking=getRanking(records);el.innerHTML=list.map(r=>{const meta=TYPE_META[r.placeType]||TYPE_META["기타"];const rank=ranking.find(x=>x.nickname===r.nickname)?.rank||0;const badge=getBadge(rank);return`<div class="record-card" onclick='showDetail("${r.id}")'><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span class="tag" style="background:${meta.tag}">${r.placeType}</span><span style="color:#FFD54F;font-size:13px">${"★".repeat(r.satisfaction)}</span><span style="margin-left:auto;font-size:11px;color:#B2BEC3">${r.createdAt.substring(0,10)}</span></div><div style="font-size:16px;font-weight:700;color:#2D3436;margin-bottom:4px">${r.placeName}</div><div style="font-size:12px;color:#636E72;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.address}</div>${r.content?`<div style="font-size:13px;color:#636E72;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${r.content}</div>`:""}${r.imageUrls?.[0]?`<div style="position:relative"><img src="${r.imageUrls[0]}" style="width:100%;height:140px;object-fit:cover;border-radius:10px;">${r.imageUrls.length>1?`<span style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.7);color:white;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;">📷 ${r.imageUrls.length}장</span>`:""}</div>`:""}<div style="display:flex;align-items:center;gap:6px;margin-top:4px"><div class="profile-circle" style="width:24px;height:24px">${r.profileImageUrl?`<img src="${r.profileImageUrl}">`:`<span class="profile-placeholder" style="font-size:12px">👤</span>`}</div><span style="font-size:12px;color:#636E72">${r.nickname}</span>${badge?`<span style="font-size:14px">${badge}</span>`:""}</div></div>`;}).join("");}

function showUserFilterDialog(){const names=[...new Set(records.map(r=>r.nickname))].sort();const options=["전체 사용자",...names];const selected=prompt("작성자 필터:\\n"+options.map((n,i)=>`${i}. ${n}`).join("\\n")+"\\n\\n번호를 입력하세요 (0=전체):");if(selected===null)return;const idx=parseInt(selected);if(idx===0||isNaN(idx)){webUserFilter="";document.getElementById("btnWebUserFilter").textContent="👤";}else if(idx>0&&idx<=names.length){webUserFilter=names[idx-1];document.getElementById("btnWebUserFilter").textContent="👤 "+webUserFilter;}renderViewList();}

function showDetail(id){detailRecord=records.find(r=>r.id===id);if(!detailRecord)return;if(mainMap)mainMap.closePopup();showScreen("detail");document.getElementById("detailTitle").textContent=detailRecord.placeName;const r=detailRecord;const meta=TYPE_META[r.placeType]||TYPE_META["기타"];const rank=getUserRank(r.nickname);const badge=getBadge(rank);document.getElementById("detailContent").innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span class="tag" style="background:${meta.tag}">${r.placeType}</span><span style="color:#FFD54F;font-size:16px">${"★".repeat(r.satisfaction)}</span><span style="margin-left:auto;font-size:12px;color:#B2BEC3">${r.createdAt.substring(0,10)}</span></div><h2 style="font-size:24px;font-weight:700;color:#2D3436;margin:0 0 8px">${r.placeName}</h2><div style="font-size:13px;color:#636E72;margin-bottom:16px">📍 ${r.address}</div><div style="height:1px;background:#E8EAED;margin-bottom:16px"></div><div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><div class="profile-circle" style="width:36px;height:36px">${r.profileImageUrl?`<img src="${r.profileImageUrl}">`:`<span class="profile-placeholder" style="font-size:18px">👤</span>`}</div><span style="font-size:14px;color:#636E72">${r.nickname}</span>${badge?`<span style="font-size:16px">${badge}</span>`:""}<span style="font-size:11px;color:#B2BEC3">작성자</span></div><div style="font-size:15px;color:#2D3436;line-height:1.7;margin-bottom:16px;white-space:pre-wrap">${r.content||"본문 없음"}</div>${(r.imageUrls||[]).map(url=>`<img class="detail-image" src="${url}">`).join("")}`;}

function handleEdit(){
  if(!detailRecord)return;
  if(detailRecord.nickname!==get("nickname")||detailRecord.pin!==get("pin"))return alert("본인의 기록만 수정할 수 있습니다.");
  // 상태 초기화
  editSelectedType=detailRecord.placeType;
  editSatisfaction=detailRecord.satisfaction;
  editExistingUrls=[...(detailRecord.imageUrls||[])];
  editNewFiles=[];
  document.getElementById("editPlaceName").value=detailRecord.placeName;
  document.getElementById("editContent").value=detailRecord.content;
  renderEditTypeChips();
  setEditSatisfaction(editSatisfaction);
  renderEditExistingPhotos();
  document.getElementById("editNewPhotos").innerHTML="";
  document.getElementById("editModal").classList.add("show");
}
function renderEditTypeChips(){
  const el=document.getElementById("editTypeChips");el.innerHTML="";
  TYPES.forEach(t=>{const meta=TYPE_META[t];const btn=document.createElement("button");btn.className=`chip ${meta.cls}${editSelectedType===t?" selected":""}`;btn.textContent=(editSelectedType===t?"✓ ":"")+t;btn.onclick=()=>{editSelectedType=t;renderEditTypeChips();};el.appendChild(btn);});
}
function setEditSatisfaction(v){
  editSatisfaction=v;
  document.getElementById("editSatValue").textContent=`${v} / 10`;
  document.getElementById("editSatSlider").value=v;
  const el=document.getElementById("editStarsContainer");el.innerHTML="";
  for(let i=1;i<=10;i++){const s=document.createElement("span");s.className=`star ${i<=v?"filled":"empty"}`;s.textContent="★";s.onclick=()=>setEditSatisfaction(i);el.appendChild(s);}
}
function renderEditExistingPhotos(){
  const el=document.getElementById("editExistingPhotos");el.innerHTML="";
  editExistingUrls.forEach((url,i)=>{const div=document.createElement("div");div.className="photo-thumb";const img=document.createElement("img");img.src=url;const btn=document.createElement("button");btn.className="photo-remove";btn.textContent="✕";btn.onclick=()=>{editExistingUrls.splice(i,1);renderEditExistingPhotos();};div.appendChild(img);div.appendChild(btn);el.appendChild(div);});
}
function handleEditNewPhotos(input){
  editNewFiles.push(...Array.from(input.files||[]));

function renderEditNewPhotos(){
  const el=document.getElementById("editNewPhotos");el.innerHTML="";
  editNewFiles.forEach((f,i)=>{const div=document.createElement("div");div.className="photo-thumb";const img=document.createElement("img");img.src=URL.createObjectURL(f);const btn=document.createElement("button");btn.className="photo-remove";btn.textContent="✕";btn.onclick=()=>{editNewFiles.splice(i,1);renderEditNewPhotos();};div.appendChild(img);div.appendChild(btn);el.appendChild(div);});
}
function closeEditModal(){document.getElementById("editModal").classList.remove("show");}
async function saveEdit(){
  const newName=document.getElementById("editPlaceName").value.trim();
  const newContent=document.getElementById("editContent").value;
  if(!newName)return alert("장소 이름을 입력해주세요");
  const btn=document.getElementById("editSaveBtn");
  btn.disabled=true;btn.textContent="저장 중...";
  try{
    // 새 이미지 업로드
    const uploadedUrls=[];
    for(const f of editNewFiles){uploadedUrls.push(await uploadImgur(f));}
    const allImageUrls=[...editExistingUrls,...uploadedUrls];
    const updated={...detailRecord,placeName:newName,content:newContent,placeType:editSelectedType||"기타",satisfaction:editSatisfaction,imageUrls:allImageUrls};
    await updateNotionRecord(updated);
    detailRecord=updated;
    const idx=records.findIndex(r=>r.id===updated.id);
    if(idx>=0)records[idx]=updated;
    showDetail(updated.id);
    closeEditModal();
    alert("수정되었습니다");
  }catch(e){alert("수정 실패: "+e.message);}
  btn.disabled=false;btn.textContent="저장";
}

async function handleDelete(){if(!detailRecord)return;if(detailRecord.nickname!==get("nickname")||detailRecord.pin!==get("pin"))return alert("본인의 기록만 삭제할 수 있습니다.");if(!confirm("이 기록을 삭제할까요?\n삭제된 기록은 복구할 수 없어요."))return;try{await archiveRecord(detailRecord.id);alert("삭제되었습니다");await loadRecords();showScreen("view");}catch(e){alert("삭제 실패: "+e.message);}}
function switchRankTab(tab){rankTab=tab;document.getElementById("tabTotal").classList.toggle("active",tab==="total");document.getElementById("tabWeekly").classList.toggle("active",tab==="weekly");renderRanking();}
function renderRanking(){const list=rankTab==="total"?getRanking(records):getRanking(records,7);const el=document.getElementById("rankList");if(!list.length){el.innerHTML=`<div style="text-align:center;margin-top:60px;color:#B2BEC3">${rankTab==="weekly"?"이번 주 기록이 없습니다":"아직 기록이 없습니다"}</div>`;return;}el.innerHTML=list.slice(0,10).map(e=>{const badge=getBadge(e.rank);const isTop=e.rank<=3;return`<div class="rank-item ${isTop?"top":"normal"} ${e.rank===1?"first":""}"><div style="width:36px;text-align:center;font-size:${isTop?22:16}px;font-weight:700;color:${isTop?"#FFD54F":"#B2BEC3"}">${badge||e.rank}</div><div class="profile-circle" style="width:40px;height:40px">${e.profileImageUrl?`<img src="${e.profileImageUrl}">`:`<span class="profile-placeholder" style="font-size:18px">👤</span>`}</div><div style="flex:1"><div style="font-weight:600;font-size:15px;color:#2D3436">${e.nickname}</div><div style="font-size:12px;color:#636E72">${e.count}개 기록</div></div></div>`;}).join("");}
function init(){if(navigator.geolocation){navigator.geolocation.getCurrentPosition(pos=>{userPos=[pos.coords.latitude,pos.coords.longitude];},()=>{},{enableHighAccuracy:true,timeout:5000});}runSplash();}
init();
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
</script>
